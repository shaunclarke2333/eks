apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: hpa
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - image: aputra/myapp-195:v2
        name: myapp
        ports: 
          - name: http
            containerPort: 8080
        resources: 
          requests: 
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 100m

